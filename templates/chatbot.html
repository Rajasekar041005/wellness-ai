<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Assistant Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h3>🏥 Health Assistant Chatbot</h3>
            <a href="{% url 'logout' %}" class="btn btn-sm btn-light">Logout</a>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                <div class="message-content">
                    <strong>Health Assistant:</strong>
                    <p>Hello! I'm your Health Assistant. Ask me about any disease (e.g., cancer, diabetes, fever, headache, etc.) and I'll provide information about symptoms, solutions, food recommendations, and exercises.</p>
                </div>
            </div>
        </div>
        
        <div class="chat-input-container">
            <input type="text" id="userInput" class="form-control chat-input" placeholder="Type a disease name (e.g., diabetes, fever, cancer)..." />
            <button id="sendBtn" class="btn btn-primary send-btn">Send</button>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/chatbot.js"></script>
</body>
</html>
