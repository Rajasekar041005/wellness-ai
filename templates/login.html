<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Health Assistant</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Page Styles -->
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1505751172876-fa1923c5c528?w=1920') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }

        .login-title {
            color: #e6150dff;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: center;
        }

        .btn-login {
            background: linear-gradient(135deg, #dc1414ff 0%, #ca1313ff 100%);
            border: none;
            padding: 12px;
            font-weight: bold;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #2f0eeaff 0%, #2412edff 100%);
        }

        .form-control:focus {
            border-color: #b4e819ff;
            box-shadow: 0 0 0 0.2rem rgba(20, 237, 31, 0.25);
        }
    </style>
</>

<body>
    <div class="login-container">
        <h2 class="login-title">🏥 Health Assistant Login</h2>

        {% if error %}
        <div class="alert alert-danger" role="alert">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="mb-3">
                <label for="user_id" class="form-label">User ID</label>
                <input type="text" class="form-control" id="user_id" name="user_id" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-login w-100">Login</button>
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
